<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" width="1180" height="760">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei","Helvetica Neue",Helvetica,Arial,sans-serif;}.t{font-size:15px;fill:#111827;font-weight:600;}.s{font-size:11.5px;fill:#6b7280;}.tiny{font-size:10.5px;fill:#6b7280;}.title{font-size:21px;fill:#111827;font-weight:600;}.sub{font-size:12.5px;fill:#6b7280;}.lbl{font-size:11.5px;fill:#374151;font-weight:600;}.reg{font-size:12px;fill:#9ca3af;font-weight:600;}</style>
<defs>
<marker id="a-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
<marker id="a-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
<marker id="a-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
<marker id="a-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
<marker id="a-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
<filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.10"/></filter>
</defs>
<rect width="1180" height="760" fill="#ffffff"/>
<text x="40" y="46" class="title">AgentCore Gateway Outbound OAuth 3LO — 部署架构 (us-east-1 / 340636688520)</text>
<text x="40" y="70" class="sub">Agent → Gateway → Agent：未授权时弹登录 URL，用户在 Cognito 授权后 token 入 Token Vault，重试即成功</text>
<rect x="360" y="96" width="784" height="556" rx="12" fill="none" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="6,4"/>
<text x="380" y="120" class="reg">AWS us-east-1 · Bedrock AgentCore</text>
<rect x="40" y="300" width="180" height="150" rx="8" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5" filter="url(#sh)"/>
<circle cx="130" cy="336" r="13" fill="none" stroke="#0d9488" stroke-width="2"/>
<path d="M112 366 a18 15 0 0 1 36 0" fill="none" stroke="#0d9488" stroke-width="2"/>
<text x="130" y="392" class="t" text-anchor="middle">用户 / 浏览器</text>
<text x="130" y="412" class="s" text-anchor="middle">① 调 Agent</text>
<text x="130" y="428" class="s" text-anchor="middle">④ 点登录 URL</text>
<text x="130" y="444" class="s" text-anchor="middle">⑦ 重试成功</text>
<rect x="400" y="300" width="190" height="150" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#sh)"/>
<text x="495.0" y="322" class="t" text-anchor="middle">Runtime A · Agent</text>
<text x="495.0" y="340" class="s" text-anchor="middle">okx_ob_agent</text>
<text x="495.0" y="355" class="s" text-anchor="middle">serverProtocol=HTTP</text>
<text x="495.0" y="370" class="s" text-anchor="middle">入站 JWT + allowlist</text>
<text x="495.0" y="385" class="s" text-anchor="middle">MCPClient / 裸 MCP</text>
<text x="495.0" y="400" class="s" text-anchor="middle">透出 -32042 登录URL</text>
<rect x="660" y="300" width="210" height="150" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5" filter="url(#sh)"/>
<text x="765.0" y="322" class="t" text-anchor="middle">MCP Gateway</text>
<text x="765.0" y="340" class="s" text-anchor="middle">okx-ob-gateway</text>
<text x="765.0" y="355" class="s" text-anchor="middle">MCP 2025-11-25</text>
<text x="765.0" y="370" class="s" text-anchor="middle">target=mcpServer</text>
<text x="765.0" y="385" class="s" text-anchor="middle">OAUTH / AUTHORIZATION_CODE</text>
<text x="765.0" y="400" class="s" text-anchor="middle">③ 无token→ -32042</text>
<rect x="940" y="300" width="180" height="150" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#sh)"/>
<text x="1030.0" y="322" class="t" text-anchor="middle">Runtime B · MCP Server</text>
<text x="1030.0" y="340" class="s" text-anchor="middle">okx_ob_mcpserver</text>
<text x="1030.0" y="355" class="s" text-anchor="middle">serverProtocol=MCP</text>
<text x="1030.0" y="370" class="s" text-anchor="middle">受 OAuth 保护 (8000/mcp)</text>
<text x="1030.0" y="385" class="s" text-anchor="middle">入站 JWT 校验</text>
<text x="1030.0" y="400" class="s" text-anchor="middle">3 个 mock 工具</text>
<rect x="400" y="150" width="300" height="96" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#sh)"/>
<text x="550.0" y="172" class="t" text-anchor="middle">Cognito 授权服务器 (Hosted UI)</text>
<text x="550.0" y="190" class="s" text-anchor="middle">us-east-1_D9GxixyVC · App Client(secret, code grant)</text>
<text x="550.0" y="205" class="s" text-anchor="middle">Resource Server scope: okx-mcp/invoke</text>
<rect x="740" y="150" width="180" height="96" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5" filter="url(#sh)"/>
<text x="830.0" y="172" class="t" text-anchor="middle">AgentCore Identity</text>
<text x="830.0" y="190" class="s" text-anchor="middle">OAuth2 Credential Provider</text>
<text x="830.0" y="205" class="s" text-anchor="middle">(OAuth Client)  +  Token Vault</text>
<rect x="940" y="150" width="180" height="96" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" filter="url(#sh)"/>
<text x="1030.0" y="172" class="t" text-anchor="middle">回调服务器 (独立 EC2)</text>
<text x="1030.0" y="190" class="s" text-anchor="middle">callback.chrisai.blog</text>
<text x="1030.0" y="205" class="s" text-anchor="middle">CompleteResourceTokenAuth</text>
<text x="1030.0" y="220" class="s" text-anchor="middle">session 绑定 (Let's Encrypt)</text>
<line x1="220" y1="352" x2="398" y2="352" stroke="#2563eb" stroke-width="1.8" fill="none" marker-end="url(#a-blue)"/>
<text x="300" y="344" class="lbl" text-anchor="middle">① 调用</text>
<line x1="590" y1="352" x2="658" y2="352" stroke="#2563eb" stroke-width="1.8" fill="none" marker-end="url(#a-blue)"/>
<text x="624" y="344" class="lbl" text-anchor="middle">② tools/call</text>
<line x1="870" y1="368" x2="938" y2="368" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#a-green)"/>
<text x="904" y="360" class="lbl" text-anchor="middle">⑥ Bearer</text>
<path d="M 658 392 L 592 392" stroke="#dc2626" stroke-width="1.8" fill="none" marker-end="url(#a-red)"/>
<text x="624" y="410" class="lbl" text-anchor="middle" fill="#dc2626">③ -32042</text>
<path d="M 398 410 L 222 410" stroke="#dc2626" stroke-width="1.8" fill="none" marker-end="url(#a-red)"/>
<text x="310" y="426" class="lbl" text-anchor="middle" fill="#dc2626">→ 登录URL</text>
<path d="M 130 298 L 130 200 L 398 200" stroke="#ea580c" stroke-width="1.8" fill="none" marker-end="url(#a-orange)"/>
<text x="250" y="192" class="lbl" text-anchor="middle" fill="#ea580c">④ 登录同意</text>
<path d="M 700 210 L 738 210" stroke="#9333ea" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#a-purple)"/>
<text x="719" y="202" class="tiny" text-anchor="middle">code↔token</text>
<path d="M 920 210 L 938 210" stroke="#ea580c" stroke-width="1.8" fill="none" marker-end="url(#a-orange)"/>
<path d="M 700 224 C 860 260, 900 250, 1030 246" stroke="#ea580c" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#a-orange)"/>
<text x="880" y="238" class="tiny" text-anchor="middle" fill="#ea580c">⑤ 重定向 session_id</text>
<path d="M 1000 246 L 900 210" stroke="#9333ea" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#a-purple)"/>
<text x="985" y="270" class="tiny" text-anchor="middle" fill="#9333ea">token 入 Vault</text>
<path d="M 800 298 L 800 248" stroke="#9333ea" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#a-purple)"/>
<text x="828" y="278" class="tiny" text-anchor="middle" fill="#9333ea">取 Vault token</text>
<path d="M 1030 246 L 1030 298" stroke="#9ca3af" stroke-width="1.8" fill="none" stroke-dasharray="4,3"/>
<text x="1058" y="278" class="tiny" text-anchor="middle">验签 JWT</text>
<g transform="translate(40, 590)">
<rect x="0" y="0" width="300" height="150" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.2"/>
<text x="14" y="22" class="lbl">图例</text>
<line x1="14" y1="40" x2="44" y2="40" stroke="#2563eb" stroke-width="1.8" marker-end="url(#a-blue)"/>
<text x="52" y="44" class="s">主调用流 (用户 token)</text>
<line x1="14" y1="61" x2="44" y2="61" stroke="#dc2626" stroke-width="1.8" marker-end="url(#a-red)"/>
<text x="52" y="65" class="s">未授权：-32042 弹登录 URL</text>
<line x1="14" y1="82" x2="44" y2="82" stroke="#ea580c" stroke-width="1.8" marker-end="url(#a-orange)"/>
<text x="52" y="86" class="s">3LO 授权 / 浏览器重定向</text>
<line x1="14" y1="103" x2="44" y2="103" stroke="#9333ea" stroke-width="1.8" marker-end="url(#a-purple)"/>
<text x="52" y="107" class="s">OAuth 换 token / Token Vault</text>
<line x1="14" y1="124" x2="44" y2="124" stroke="#16a34a" stroke-width="1.8" marker-end="url(#a-green)"/>
<text x="52" y="128" class="s">授权后经 Vault token 调下游</text>
</g>
</svg>