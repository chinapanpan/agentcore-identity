<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="'Noto Sans CJK SC','Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/></marker>
    <marker id="ao" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#ea580c"/></marker>
    <marker id="aa" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#d97706"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/></marker>
  </defs>
  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="600" y="36" text-anchor="middle" font-size="23" font-weight="700" fill="#0f172a">OKX Cognito role_id Demo — 部署架构（us-east-1 / 账号 340636688520）</text>
  <text x="600" y="62" text-anchor="middle" font-size="13" fill="#64748b">Cognito 签发带 role_id 的 JWT　→　Runtime 上的 Strands Agent 透传 token　→　Gateway 按 role_id 做工具级授权</text>

  <!-- stage bands -->
  <rect x="20" y="82" width="356" height="600" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="396" y="82" width="330" height="600" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="746" y="82" width="434" height="600" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="198" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">① 身份签发 · Amazon Cognito</text>
  <text x="561" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">② 调用 Agent · AgentCore Runtime</text>
  <text x="963" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">③ 工具授权 · AgentCore Gateway</text>

  <!-- ===== Stage 1: Cognito ===== -->
  <rect x="44" y="124" width="308" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="198" y="146" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1e3a8a">Cognito User Pool（ESSENTIALS 功能层）</text>
  <text x="198" y="166" text-anchor="middle" font-size="11" font-family="monospace" fill="#334155">us-east-1_txY98YTIX</text>
  <text x="198" y="184" text-anchor="middle" font-size="11" fill="#475569">自定义属性 custom:role_id（存用户目录）</text>

  <rect x="44" y="206" width="308" height="94" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="198" y="227" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">3 个用户（App Client 4nbds…bofq8，无 secret）</text>
  <text x="198" y="249" text-anchor="middle" font-size="11" font-family="monospace" fill="#334155">viewer-user   → custom:role_id = 1001</text>
  <text x="198" y="268" text-anchor="middle" font-size="11" font-family="monospace" fill="#334155">analyst-user  → custom:role_id = 1002</text>
  <text x="198" y="287" text-anchor="middle" font-size="11" font-family="monospace" fill="#334155">trader-user   → custom:role_id = 1003</text>

  <rect x="44" y="322" width="308" height="82" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="198" y="344" text-anchor="middle" font-size="12.5" font-weight="700" fill="#92400e">Pre-Token-Gen Lambda（触发器 V2_0）</text>
  <text x="198" y="364" text-anchor="middle" font-size="11" font-family="monospace" fill="#334155">okx-ct-pretoken</text>
  <text x="198" y="384" text-anchor="middle" font-size="11" fill="#475569">读 custom:role_id → 注入 role_id claim</text>

  <rect x="44" y="440" width="308" height="96" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="198" y="462" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1e3a8a">签发 JWT · Access Token</text>
  <text x="198" y="483" text-anchor="middle" font-size="11" font-family="monospace" fill="#334155">token_use = "access"</text>
  <text x="198" y="502" text-anchor="middle" font-size="11" font-family="monospace" fill="#b45309">role_id = "1001 / 1002 / 1003"</text>
  <text x="198" y="521" text-anchor="middle" font-size="11" fill="#475569">默认有效 60 分钟（非一次性、可复用）</text>

  <line x1="198" y1="404" x2="198" y2="438" stroke="#d97706" stroke-width="2" marker-end="url(#aa)"/>
  <text x="252" y="425" text-anchor="middle" font-size="10.5" font-weight="600" fill="#b45309">注入 claim</text>

  <!-- ===== Stage 2: Runtime ===== -->
  <rect x="414" y="124" width="294" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="561" y="146" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1e3a8a">用户 / 客户端</text>
  <text x="561" y="166" text-anchor="middle" font-size="10.5" fill="#334155">裸 HTTPS POST + Authorization: Bearer &lt;JWT&gt;</text>
  <text x="561" y="184" text-anchor="middle" font-size="10.5" fill="#64748b">（boto3 不支持 bearer，需自发 HTTPS）</text>

  <rect x="414" y="222" width="294" height="314" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="561" y="245" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">AgentCore Runtime</text>
  <text x="561" y="263" text-anchor="middle" font-size="10" font-family="monospace" fill="#64748b">okx_ct_runtime-vd5QiVHH70</text>

  <rect x="430" y="274" width="262" height="58" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
  <text x="561" y="294" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1e3a8a">Inbound JWT 校验（CUSTOM_JWT）</text>
  <text x="561" y="313" text-anchor="middle" font-size="10.5" fill="#475569">验签 / iss / client_id</text>
  <text x="561" y="327" text-anchor="middle" font-size="10.5" fill="#b91c1c">不合法 → 401（进不到容器）</text>

  <rect x="430" y="340" width="262" height="52" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
  <text x="561" y="360" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1e3a8a">requestHeaderConfiguration</text>
  <text x="561" y="379" text-anchor="middle" font-size="10" font-family="monospace" fill="#475569">requestHeaderAllowlist:["Authorization"]</text>

  <rect x="430" y="400" width="262" height="56" rx="6" fill="#ffffff" stroke="#475569" stroke-width="1.3"/>
  <text x="561" y="420" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0f172a">Strands Agent（agent.py）</text>
  <text x="561" y="439" text-anchor="middle" font-size="10.5" fill="#475569">解 role_id · 动态包装 Gateway 工具</text>

  <rect x="430" y="464" width="262" height="60" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="561" y="484" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400e">★ MCPClient 注入 Authorization 头</text>
  <text x="561" y="502" text-anchor="middle" font-size="9.5" font-family="monospace" fill="#475569">streamablehttp_client(url, headers={...})</text>
  <text x="561" y="517" text-anchor="middle" font-size="10" fill="#b45309">默认不自动透传，必须显式注入</text>

  <!-- ===== Stage 3: Gateways + Target ===== -->
  <rect x="762" y="124" width="256" height="182" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="890" y="146" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0f172a">Gateway A · okx-ct-gw-interceptor</text>
  <rect x="776" y="156" width="228" height="46" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
  <text x="890" y="175" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Inbound Auth · CUSTOM_JWT</text>
  <text x="890" y="192" text-anchor="middle" font-size="10" fill="#b91c1c">无 / 伪造 token → 401</text>
  <rect x="776" y="210" width="228" height="86" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.4"/>
  <text x="890" y="230" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">拦截器 Lambda（okx-ct-interceptor）</text>
  <text x="890" y="249" text-anchor="middle" font-size="10" fill="#475569">REQUEST：拒越权 tools/call（-32001）</text>
  <text x="890" y="267" text-anchor="middle" font-size="10" fill="#475569">RESPONSE：按 role_id 过滤 tools/list</text>
  <text x="890" y="285" text-anchor="middle" font-size="10" fill="#7c3aed">代码判定 role_id ∈ ROLE_TOOLS</text>

  <rect x="762" y="326" width="256" height="182" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="890" y="348" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0f172a">Gateway B · okx-ct-gw-cedar</text>
  <rect x="776" y="358" width="228" height="46" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.3"/>
  <text x="890" y="377" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Inbound Auth · CUSTOM_JWT</text>
  <text x="890" y="394" text-anchor="middle" font-size="10" fill="#b91c1c">无 / 伪造 token → 401</text>
  <rect x="776" y="412" width="228" height="86" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.4"/>
  <text x="890" y="432" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">Cedar Policy Engine</text>
  <text x="890" y="450" text-anchor="middle" font-size="9.5" font-family="monospace" fill="#475569">okx_ct_policy_engine-besh…</text>
  <text x="890" y="468" text-anchor="middle" font-size="10" fill="#475569">role_id=="1003" 精确匹配 · 默认拒绝</text>
  <text x="890" y="486" text-anchor="middle" font-size="10" fill="#059669">声明式策略 · 拒绝码 -32002</text>

  <!-- Target lambda -->
  <rect x="1046" y="236" width="122" height="196" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.8"/>
  <text x="1107" y="260" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">Target Lambda</text>
  <text x="1107" y="278" text-anchor="middle" font-size="9.5" font-family="monospace" fill="#334155">okx-ct-target</text>
  <line x1="1060" y1="288" x2="1154" y2="288" stroke="#fbbf24" stroke-width="1"/>
  <text x="1107" y="308" text-anchor="middle" font-size="10" fill="#334155">get_token_price</text>
  <text x="1107" y="330" text-anchor="middle" font-size="9.5" fill="#334155">calc_impermanent_loss</text>
  <text x="1107" y="352" text-anchor="middle" font-size="10" fill="#334155">place_order（mock）</text>
  <line x1="1060" y1="366" x2="1154" y2="366" stroke="#fbbf24" stroke-width="1"/>
  <text x="1107" y="386" text-anchor="middle" font-size="9.5" fill="#9a3412">工具本身不做鉴权</text>
  <text x="1107" y="404" text-anchor="middle" font-size="9.5" fill="#64748b">鉴权全在 Gateway 侧</text>
  <text x="1107" y="422" text-anchor="middle" font-size="9.5" fill="#64748b">（平台级统一管控）</text>

  <!-- ===== cross-stage arrows ===== -->
  <!-- token to caller -->
  <line x1="352" y1="488" x2="412" y2="180" stroke="#d97706" stroke-width="2" marker-end="url(#aa)"/>
  <text x="384" y="330" text-anchor="middle" font-size="10.5" font-weight="600" fill="#b45309" transform="rotate(-78 384 330)">登录取 token</text>

  <!-- caller into runtime inbound -->
  <line x1="561" y1="194" x2="561" y2="220" stroke="#2563eb" stroke-width="2.2" marker-end="url(#ab)"/>
  <text x="620" y="210" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2563eb">Bearer</text>

  <!-- runtime mcpclient to GW A + GW B -->
  <path d="M708 490 C 735 480, 740 220, 760 200" fill="none" stroke="#2563eb" stroke-width="2.2" marker-end="url(#ab)"/>
  <path d="M708 500 C 735 505, 745 400, 760 400" fill="none" stroke="#2563eb" stroke-width="2.2" marker-end="url(#ab)"/>
  <text x="725" y="340" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb" transform="rotate(-88 725 340)">透传同一 JWT</text>

  <!-- GW A -> target ; GW B -> target (outbound IAM) -->
  <path d="M1004 253 C 1025 262, 1030 300, 1044 310" fill="none" stroke="#ea580c" stroke-width="2.2" marker-end="url(#ao)"/>
  <path d="M1004 455 C 1025 446, 1030 380, 1044 360" fill="none" stroke="#ea580c" stroke-width="2.2" marker-end="url(#ao)"/>
  <text x="1015" y="340" text-anchor="middle" font-size="9.5" font-weight="600" fill="#ea580c">Outbound·IAM</text>

  <!-- ===== footnotes ===== -->
  <rect x="20" y="556" width="356" height="126" rx="10" fill="#f8fafc" stroke="none"/>
  <text x="36" y="580" font-size="11" font-weight="700" fill="#0f172a">关键点</text>
  <text x="36" y="600" font-size="10.5" fill="#475569">• role_id 由服务端触发器注入，客户端不可伪造</text>
  <text x="36" y="618" font-size="10.5" fill="#475569">• access token 时间有效、可复用（非一次性）</text>
  <text x="36" y="636" font-size="10.5" fill="#475569">• Runtime 与 Gateway 信任同一 Pool + App Client</text>
  <text x="36" y="654" font-size="10.5" fill="#475569">• 同一 token 两端都能过，用户身份一路保留</text>
  <text x="36" y="672" font-size="10.5" fill="#475569">• 两个 Gateway 用同一批 token，授权结果一致</text>

  <text x="561" y="580" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">两处缺一不可（否则 Gateway 入站 401）</text>
  <text x="561" y="602" text-anchor="middle" font-size="10.5" fill="#475569">① Runtime allowlist 放行 Authorization</text>
  <text x="561" y="620" text-anchor="middle" font-size="10.5" fill="#475569">② MCPClient 把 token 显式注入下游 HTTP 头</text>
  <text x="561" y="646" text-anchor="middle" font-size="10.5" fill="#64748b">Gateway 是公网 HTTPS 端点：谁都能连，</text>
  <text x="561" y="664" text-anchor="middle" font-size="10.5" fill="#64748b">但无合法 JWT 在 Inbound Auth 直接 401。</text>

  <text x="963" y="580" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Inbound vs Outbound Auth</text>
  <text x="963" y="602" text-anchor="middle" font-size="10.5" fill="#475569">Inbound = 用调用方（用户）身份 → 能否进 + 调哪些工具</text>
  <text x="963" y="620" text-anchor="middle" font-size="10.5" fill="#475569">Outbound = 用 Gateway 服务身份（IAM）→ 怎么调后端 Lambda</text>
  <text x="963" y="644" text-anchor="middle" font-size="10.5" fill="#475569">拦截器（代码）与 Cedar（声明式）授权结果完全一致：</text>
  <text x="963" y="662" text-anchor="middle" font-size="10.5" fill="#475569">1001→查价 ｜ 1002→查价+算IL ｜ 1003→全部含下单</text>
</svg>
